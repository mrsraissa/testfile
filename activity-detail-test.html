<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity Details</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    :root {
      --main-color: #2C5F8A;
      --light-bg: #EAF3FA;
      --soft-box: #F4F9FD;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--light-bg);
      color: #333;
      padding-top: 80px;
      padding-bottom: 90px;
      text-align: center;
    }

    .header,
    .bottom-bar {
      position: fixed;
      left: 0;
      width: 100%;
      height: 60px;
      background: var(--main-color);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .header {
      top: 0;
    }

    .bottom-bar {
      bottom: 0;
    }

    .bottom-bar button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .back-btn {
      position: absolute;
      left: 20px;
    }

    .home-btn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .card {
      background: white;
      width: 90%;
      max-width: 440px;
      margin: auto;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    label {
      font-weight: bold;
      color: var(--main-color);
    }

    input[type="date"] {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 14px auto 0;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
      box-sizing: border-box;
    }

    .load-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--main-color);
      color: white;
      font-size: 16px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .load-btn:hover {
      filter: brightness(0.92);
    }

    #results {
      margin-top: 20px;
      text-align: left;
    }

    .item {
      background: var(--soft-box);
      border-left: 5px solid var(--main-color);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      color: #333;
    }

    .empty {
      text-align: center;
      color: #777;
      margin-top: 18px;
    }

    .material-icons {
      font-size: 28px;
    }
  </style>
</head>

<body>

  <div class="header">

    <div style="display:flex; align-items:center; gap:10px;">

      <span id="headerIcon" class="material-icons" style="font-size:24px;">
        qr_code_scanner
      </span>

      <h2 id="pageTitle" style="font-size:18px; font-weight:normal; margin:0;"></h2>

    </div>

  </div>

  <div class="card">

    <label>Select Date:</label>

    <input type="date" id="selectedDate">

    <button class="load-btn" onclick="loadActivity()">
      <span class="material-icons" style="font-size:22px;">search</span>
      View Activity
    </button>

    <div id="results"></div>

  </div>

  <div class="bottom-bar">

    <button class="back-btn" onclick="goBack()">
      <span class="material-icons">arrow_back</span>
    </button>

    <button class="home-btn" onclick="goHome()">
      <span class="material-icons">home</span>
    </button>

  </div>

  <script>

    const scriptURL = "https://script.google.com/macros/s/AKfycbzHAHHd-ZuKxEB2V7ZQz1nkH_CHvtrsjMFfsMrVShljuhBqU3mR_0nXBTYYvsbcMhrs/exec";

    const params = new URLSearchParams(window.location.search);

    const action = params.get("action") || "scans";

    const settings = {

      scans: {
        title: "Check Out",
        icon: "qr_code_scanner",
        main: "#FB8C00",
        light: "#FFE0B3",
        soft: "#FFF3E0"
      },

      reports: {
        title: "Technical Report",
        icon: "description",
        main: "#2E7D32",
        light: "#DAF2D6",
        soft: "#F1F9F0"
      },

      returns: {
        title: "Product Return",
        icon: "undo",
        main: "#7B4AB3",
        light: "#E6D6F0",
        soft: "#F3E8FF"
      }

    };

    const page = settings[action] || settings.scans;

    document.documentElement.style.setProperty("--main-color", page.main);
    document.documentElement.style.setProperty("--light-bg", page.light);
    document.documentElement.style.setProperty("--soft-box", page.soft);

    document.getElementById("pageTitle").innerText = page.title;

    document.getElementById("headerIcon").innerText = page.icon;

    document.title = page.title;

    let employeeName = localStorage.getItem("employeeName");

    if (!employeeName || employeeName === "Unknown") {
      employeeName = "Will";
    }

    const today = new Date().toISOString().split("T")[0];

    document.getElementById("selectedDate").value = today;

    async function loadActivity() {

      const selectedDate = document.getElementById("selectedDate").value;

      const resultsDiv = document.getElementById("results");

      resultsDiv.innerHTML = `<p class="empty">Loading activity...</p>`;

      try {

        const url =
          `${scriptURL}?action=${encodeURIComponent(action)}&employee=${encodeURIComponent(employeeName)}&date=${encodeURIComponent(selectedDate)}`;

        const response = await fetch(url);

        const data = await response.json();

        if (!data.results || data.results.length === 0) {

          resultsDiv.innerHTML =
            `<p class="empty">No activity found for this date.</p>`;

          return;
        }

        resultsDiv.innerHTML =
          data.results.map(item => renderItem(item)).join("");

      } catch (err) {

        console.error(err);

        resultsDiv.innerHTML =
          `<p class="empty">Could not load activity.</p>`;
      }
    }

    function renderItem(item) {

      if (action === "reports") {

        return `
          <div class="item">
            <strong>${item.product || "Unknown Product"}</strong><br>
            Time: ${item.time || ""}<br>
            Amount: ${item.amount || ""} ${item.unit || ""}
          </div>
        `;
      }

      if (action === "returns") {

        return `
          <div class="item">
            <strong>${item.product || "Unknown Product"}</strong><br>
            Time: ${item.time || ""}<br>
            Returned Qty: ${item.quantity || ""}
          </div>
        `;
      }

      return `
        <div class="item">
          <strong>${item.product || "Unknown Product"}</strong><br>
          Time: ${item.time || ""}<br>
          Check Out Qty:${item.quantity || ""}
        </div>
      `;
    }

    function goBack() {
      window.location.href = "my-activity-test.html";
    }

    function goHome() {
      window.location.href = "index.html";
    }

  </script>

</body>
</html>
