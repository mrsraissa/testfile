<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity Details</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0fdf4;
      color: #065f46;
      padding-top: 80px;
      padding-bottom: 90px;
      text-align: center;
    }

    .header,
    .bottom-bar {
      position: fixed;
      left: 0;
      width: 100%;
      height: 60px;
      background: #198450;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .header {
      top: 0;
    }

    .bottom-bar {
      bottom: 0;
      justify-content: space-around;
    }

    .bottom-bar button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .card {
      background: white;
      width: 90%;
      max-width: 440px;
      margin: auto;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    input[type="date"] {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 14px auto 0;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
      box-sizing: border-box;
    }

    .load-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #198450;
      color: white;
      font-size: 16px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    .load-btn:hover {
      background: #106d3f;
    }

    #results {
      margin-top: 20px;
      text-align: left;
    }

    .item {
      background: #f7fff9;
      border-left: 5px solid #198450;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      color: #333;
    }

    .empty {
      text-align: center;
      color: #777;
      margin-top: 18px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h2 id="pageTitle" style="font-size:18px; font-weight:normal; margin:0;"></h2>
  </div>

  <div class="card">

    <h3 id="sectionTitle"></h3>

    <p>
      Employee:
      <strong id="employeeNameDisplay"></strong>
    </p>

    <label>Select Date:</label>

    <input type="date" id="selectedDate">

    <button class="load-btn" onclick="loadActivity()">
      <span class="material-icons">search</span>
      View Activity
    </button>

    <div id="results"></div>

  </div>

  <div class="bottom-bar">

    <button onclick="goBack()">
      <span class="material-icons">arrow_back</span>
    </button>

    <button onclick="goHome()">
      <span class="material-icons">home</span>
    </button>

  </div>

  <script>

    const scriptURL = "https://script.google.com/macros/s/AKfycbzj7XZaC4dckdfOzqV6LHNmD72SC0ixbSJz2oxlj5G1jAJ4PEUC8k6wXkqSyT3kMc5q/exec";

    const params = new URLSearchParams(window.location.search);

    const action = params.get("action") || "scans";

    const titles = {
      scans: "Check Out",
      reports: "Technical Report",
      returns: "Returns"
    };

    document.getElementById("pageTitle").innerText = titles[action];
    document.getElementById("sectionTitle").innerText = titles[action];

    let employeeName = localStorage.getItem("employeeName");

    if (!employeeName || employeeName === "Unknown") {
      employeeName = "Will";
    }

    document.getElementById("employeeNameDisplay").innerText = employeeName;

    const today = new Date().toISOString().split("T")[0];

    document.getElementById("selectedDate").value = today;

    async function loadActivity() {

      const selectedDate = document.getElementById("selectedDate").value;

      const resultsDiv = document.getElementById("results");

      resultsDiv.innerHTML = `<p class="empty">Loading activity...</p>`;

      try {

        const url =
          `${scriptURL}?action=${encodeURIComponent(action)}&employee=${encodeURIComponent(employeeName)}&date=${encodeURIComponent(selectedDate)}`;

        const response = await fetch(url);

        const data = await response.json();

        if (!data.results || data.results.length === 0) {
          resultsDiv.innerHTML =
            `<p class="empty">No activity found for this date.</p>`;
          return;
        }

        resultsDiv.innerHTML =
          data.results.map(item => renderItem(item)).join("");

      } catch (err) {

        console.error(err);

        resultsDiv.innerHTML =
          `<p class="empty">Could not load activity.</p>`;
      }
    }

    function renderItem(item) {

      if (action === "reports") {

        return `
          <div class="item">
            <strong>${item.product || "Unknown Product"}</strong><br>
            Time: ${item.time || ""}<br>
            Amount: ${item.amount || ""} ${item.unit || ""}
          </div>
        `;
      }

      if (action === "returns") {

        return `
          <div class="item">
            <strong>${item.product || "Unknown Product"}</strong><br>
            Time: ${item.time || ""}<br>
            Returned Qty: ${item.quantity || ""}
          </div>
        `;
      }

      return `
        <div class="item">
          <strong>${item.product || "Unknown Product"}</strong><br>
          Time: ${item.time || ""}<br>
          Quantity: ${item.quantity || ""}
        </div>
      `;
    }

    function goBack() {
      window.location.href = "my-activity-test.html";
    }

    function goHome() {
      window.location.href = "index.html";
    }

  </script>

</body>
</html>
