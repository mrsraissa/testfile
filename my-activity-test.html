<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Activity</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f0fdf4;
    }

    h2 {
      margin-top: 20px;
      color: #065f46;
    }

    .menu-button {
      font-size: 16px;
      padding: 14px 24px;
      margin: 12px auto;
      width: 80%;
      max-width: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      border-radius: 12px;
      color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      cursor: pointer;
    }

    .menu-button:hover {
      filter: brightness(0.92);
    }

    .checkout-button {
      background-color: #FB8C00;
    }

    .report-button {
      background-color: #198450;
    }

    .return-button {
      background-color: #7B4AB3;
    }

    .home-button {
      background-color: #198450;
      margin-top: 28px;
    }
  </style>
</head>

<body>
  <h2>📋 My Activity</h2>

  <button class="menu-button checkout-button" onclick="openActivity('scans')">
    <span class="material-icons">inventory_2</span>
    Check Out
  </button>

  <button class="menu-button report-button" onclick="openActivity('reports')">
    <span class="material-icons">description</span>
    Technical Report
  </button>

  <button class="menu-button return-button" onclick="openActivity('returns')">
    <span class="material-icons">undo</span>
    Returns
  </button>

  <button class="menu-button home-button" onclick="goHome()">
    <span class="material-icons">home</span>
    Main Menu
  </button>

  <script>
    function openActivity(type) {
      window.location.href = `activity-detail-test.html?action=${type}`;
    }

    function goHome() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
