<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Activity</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #EAF3FA;
      color: #1F3F5B;
      padding-top: 80px;
      padding-bottom: 90px;
      text-align: center;
    }

    .header,
    .bottom-bar {
      position: fixed;
      left: 0;
      width: 100%;
      height: 60px;
      background: #2C5F8A;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .header {
      top: 0;
    }

    .bottom-bar {
      bottom: 0;
    }

    .bottom-bar button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .bottom-bar .material-icons {
      font-size: 28px;
      color: white;
    }

    .card {
      background: white;
      width: 90%;
      max-width: 420px;
      margin: auto;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    h3 {
      margin-top: 0;
      color: #2C5F8A;
    }

    .activity-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 16px;
      margin-top: 14px;
      font-size: 17px;
      background: #3E78AA;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .activity-btn:hover {
      background: #2C5F8A;
      transform: scale(1.03);
    }

    .material-icons {
      font-size: 22px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h2 id="pageTitle" style="font-size:18px; font-weight:normal; margin:0;">
    </h2>
  </div>

  <div class="card">

    <h3 id="selectTypeText"></h3>

    <button class="activity-btn" onclick="openActivity('scans')">
      <span class="material-icons">qr_code_scanner</span>
      <span id="checkoutText"></span>
    </button>

    <button class="activity-btn" onclick="openActivity('reports')">
      <span class="material-icons">description</span>
      <span id="reportText"></span>
    </button>

    <button class="activity-btn" onclick="openActivity('returns')">
      <span class="material-icons">undo</span>
      <span id="returnText"></span>
    </button>

  </div>

  <div class="bottom-bar">
    <button onclick="goHome()">
      <span class="material-icons">home</span>
    </button>
  </div>

  <script>

    const lang = localStorage.getItem('preferredLanguage') || 'en';

    const translations = {

      en: {
        pageTitle: "My Activity",
        selectType: "Select Activity Type",
        checkout: "Check Out",
        report: "Technical Report",
        returns: "Product Return"
      },

      es: {
        pageTitle: "Mi Actividad",
        selectType: "Seleccionar tipo de actividad",
        checkout: "Registro de salida",
        report: "Informe Técnico",
        returns: "Devolución de producto"
      }

    };

    const t = translations[lang];

    document.getElementById("pageTitle").innerText = t.pageTitle;

    document.getElementById("selectTypeText").innerText = t.selectType;

    document.getElementById("checkoutText").innerText = t.checkout;

    document.getElementById("reportText").innerText = t.report;

    document.getElementById("returnText").innerText = t.returns;

    function openActivity(type) {
      window.location.href = `activity-detail-test.html?action=${type}`;
    }

    function goHome() {
      window.location.href = "index.html";
    }

  </script>

</body>
</html>
