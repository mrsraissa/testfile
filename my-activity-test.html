<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Activity</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0fdf4;
      color: #065f46;
      padding-top: 80px;
      padding-bottom: 90px;
      text-align: center;
    }

    .header,
    .bottom-bar {
      position: fixed;
      left: 0;
      width: 100%;
      height: 60px;
      background: #198450;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .header { top: 0; }
    .bottom-bar { bottom: 0; }

    .bottom-bar button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .card {
      background: white;
      width: 90%;
      max-width: 420px;
      margin: auto;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    h3 {
      margin-top: 0;
      color: #065f46;
    }

    .activity-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 16px;
      margin-top: 14px;
      font-size: 17px;
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .activity-btn:hover {
      transform: scale(1.03);
    }

    .checkout-btn {
      background: #FB8C00;
    }

    .report-btn {
      background: #2E7D32;
    }

    .return-btn {
      background: #7B4AB3;
    }

    .material-icons {
      font-size: 22px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h2 style="font-size:18px; font-weight:normal; margin:0;">
      My Activity
    </h2>
  </div>

  <div class="card">
    <h3>Select Activity Type</h3>

    <button class="activity-btn checkout-btn" onclick="openActivity('scans')">
      <span class="material-icons">inventory_2</span>
      Check Out
    </button>

    <button class="activity-btn report-btn" onclick="openActivity('reports')">
      <span class="material-icons">description</span>
      Technical Report
    </button>

    <button class="activity-btn return-btn" onclick="openActivity('returns')">
      <span class="material-icons">undo</span>
      Returns
    </button>
  </div>

  <div class="bottom-bar">
    <button onclick="goHome()">
      <span class="material-icons">home</span>
    </button>
  </div>

  <script>
    function openActivity(type) {
      window.location.href = `activity-detail-test.html?action=${type}`;
    }

    function goHome() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
